<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ng</title>
    <script src="angular.min.js"></script>
    <script>
        var app = angular.module('app', []);
        app.controller('nameCtrl', ['$scope', function($scope) {
            $scope.name = 'Barrior';

            //使用$.apply就不用使用$watch监听了，其mvvm数据视图更新也是调用的该方法
            setTimeout(function () {
                $scope.$apply(function () {
                    $scope.name = 'changeName';
                });
            }, 1000 );
        }]);
    </script>
</head>
<body>
    <div ng-app="app" ng-controller="nameCtrl">
        {{name}}
    </div>
</body>
</html>
