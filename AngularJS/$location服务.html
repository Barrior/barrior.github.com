<!DOCTYPE html>
<html lang="en" ng-app="app">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .container{
            width: 300px;
            margin: 50px auto;
        }
    </style>
    <script src="angular.min.js"></script>
    <script>
        var app = angular.module('app', []);

        app.controller('body', ['$scope','$location', function( $scope, $location ){
            /*
                $location
                    absUrl()            【获取】绝对路径
                    path()              【获取或设置】路由
                    replace()           不想出现历史管理，正常情况不会用它
                    hash()              【获取或设置】hash值
                    search()            【获取或设置】搜索值
                    url()               【获取或设置】路由地址
                    host()               主机名
                    port()               端口
                    protocol()           协议
             */
            //http://localhost:63342/barrior.github.com/AngularJS/$location%E6%9C%8D%E5%8A%A1.html
            console.log( $location.absUrl() );

            $location.path( 'user/info' );                //设置路由为 '#/home'
            console.log( $location.path() );              //获取路由为 '/home'

            $location.hash( 'source' );
            $location.search({
                name: 'Barrior',
                age: 23
            });

            console.log( $location.hash() );              //'source'
            console.log( $location.url() );               //'/user/info?name=Barrior&age=23#source'
        }]);
    </script>
</head>
<body ng-controller="body">

    <div class="container">

    </div>

</body>
</html>
