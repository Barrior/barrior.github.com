<!DOCTYPE html>
<html ng-app="app">
<head>
    <meta charset="UTF-8">
    <title>ng</title>
    <script src="js/angular.min.js"></script>
    <script>
        var app = angular.module('app', []);

        app.controller('repeat',['$scope', function( $scope ){
            $scope.dataList = [{
                name: 'Barrior',
                age: 23
            }, {
                name: 'Jack',
                age: 24
            }, {
                name: 'Tom',
                age: 24
            }, {
                name: 'Leo',
                age: 22
            }];
        }]);

    </script>
</head>
<body>
<div ng-controller="repeat">
    <ul>
        <li ng-repeat="data in dataList">
            Hello, I'm "{{data.name}}", {{data.age}} years old now.
        </li>
    </ul>
</div>
</body>
</html>
