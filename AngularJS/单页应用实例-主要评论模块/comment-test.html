<!DOCTYPE html>
<html lang="en" ng-app="app">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <!--
        cpt(component)表示组件
            组件的数据加上组件的前缀，这样后期别人看就非常容易看懂了，
            虽看似冗余，但是定义得越清晰越中规中矩的东西越容易维护，别人看得就不会那么吃力
    -->
    <cpt-comment></cpt-comment>
    <cpt-comment
            cpt-comment-cid="542352"
            cpt-comment-set="{btnVal: '评论'}">
    </cpt-comment>

    <div cpt-comment="反馈"
         cpt-comment-cid="84878"
         cpt-comment-set="{btnVal: '反馈'}">
    </div>

    <div ng-style="{border: '1px solid #ccc', padding: '20px'}">
        <h4>Changing WEB VIEW</h4>
        <a href="#index">首页</a>
        <a href="#invoice">发票管理</a>
        <div ng-view></div>
    </div>

    <script src="main.js"></script>
</body>
</html>
