<!DOCTYPE html>
<html lang="en" ng-app="app">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        *, :after, :before {
            -moz-box-sizing: border-box;
            box-sizing: border-box;
        }
        body{
            font: 12px/1.5 "微软雅黑";
            color: #333;
        }
        div{
            width: 100px;
            height: 100px;
            position: absolute;
            left: 400px;
        }
        .div1{
            background-color: red;
            top: 50px;
        }
        .div2{
            background-color: blue;
            top: 200px;
        }
    </style>
    <script src="jquery.js"></script>
    <script src="angular.min.js"></script>
    <script>
        var app = angular.module('app', []);

        app.directive('myDrag', function(){
            return {
                restrict: 'A',
                link: function( scope, elem, attr ){
                    var options = attr.myDrag === 'true';
                    elem.on('mousedown', function( e ){
                        var $elem = $(this);
                        var disX = e.clientX - $(this).offset().left;
                        var disY = e.clientY - $(this).offset().top;
                        var left;
                        var top;
                        if( options ){
                            $elem = $('<div>').css({
                                width: $elem.outerWidth(),
                                height: $elem.outerHeight(),
                                left: $elem.offset().left,
                                top: $elem.offset().top,
                                border: '1px dashed #333'
                            }).appendTo( 'body' );
                        }
                        $(document).on('mousemove', function( e ){
                            left = e.clientX - disX;
                            top = e.clientY - disY;
                            $elem.css({
                                left: left,
                                top: top
                            });
                        });
                        $(document).on('mouseup', function(){
                            $(this).off();
                            if( options ){
                                elem.css({
                                    left: left,
                                    top: top
                                });
                                $elem.remove();
                            }
                        });
                        return false;
                    });
                }
            };

        });
    </script>
</head>
<body>

    <div class="div1" my-drag="true"></div>
    <div class="div2" my-drag="false"></div>


</body>
</html>
