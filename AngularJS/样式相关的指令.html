<!DOCTYPE html>
<html ng-app="app">
<head>
    <meta charset="UTF-8">
    <title>ng</title>
    <style>
        .red{
            background-color: red;
        }
        .blue{
            background-color: blue;
        }
    </style>
    <script src="js/angular.min.js"></script>
    <script>
        var app = angular.module('app', []);

        app.controller('ctrl',['$scope', function( $scope ){

            $scope.imgUrl = 'https://www.baidu.com/img/bd_logo1.png';
            $scope.href = 'http://www.baidu.com/';
            $scope.linkTitle = 'Link to Baidu';

            console.log( angular )
            console.log( app )
            console.log( $scope )

        }]);

    </script>
</head>
<body>
<div ng-controller="ctrl">

    <!--
        ng-attr 属性类的指令，内容需要加{{}}括号
        提示：能使用ng-attr属性指令的尽量用指令，原生属性添加渲染数据，会造成延后，或其他相关误操作，或浏览器误请求
    -->
    <div ng-class="{red: true}" ng-style="{fontSize: '20px', lineHeight: 2}">red</div>
    <img ng-src="{{imgUrl}}">

    <!--
        有或没有的属性，都可以用ng-attr-name的指令渲染相应的属性，如ng-attr-title，ng-attr-href
        注意：linkTitle不要用中横线，尽量用驼峰形式
    -->
    <a ng-href="{{href}}" ng-attr-title="{{linkTitle}}"> Link to Baidu </a>

</div>
</body>
</html>
