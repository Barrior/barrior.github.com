<!DOCTYPE html>
<html lang="en" ng-app="app">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="angular.min.js"></script>
    <script>
        var app = angular.module('app', []);
        app.controller('ctrl', ['$scope', function( $scope ){

            $scope.name = 'Barrior';

        }]);

        //自定义指令，驼峰式写法，在html用横线表示
        app.directive('showName', function(){
            /*
             scope: 独立作用域
                为true，让组件的引用独立分开
             */
            return {
                scope: true,
                template: '<h3> {{ name }} </h3>'
            };

        });
    </script>
</head>
<body ng-controller="ctrl">

    <show-name></show-name>
    <div show-name ng-init="name = 'Cico'"></div>

</body>
</html>
