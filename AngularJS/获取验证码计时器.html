<!DOCTYPE html>
<html lang="en" ng-app="app">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        input{
            background-color: #fff;
            border: 1px solid #ccc;
            padding: 4px 6px;
            cursor: pointer;
        }
        input:disabled{
            background-color: #e2e2e2;
        }
    </style>
    <script src="angular.min.js"></script>
    <script>
        var app = angular.module('app', []);

        app.controller('ctrl',['$scope', '$interval', function( $scope, $interval ){

            var num = 5;
            var timer = null;

            $scope.text = '获取验证码';
            $scope.isDisabled = false;

            $scope.getCode = function( isDisabled ){
                if( !isDisabled ){
                    run();
                    timer = $interval(function(){
                        run();
                    }, 1000 );
                }
            };

            function run(){
                console.log( num );
                num--;
                if( num !== 0 ){
                    $scope.text = num + '秒后重新获取';
                    $scope.isDisabled = true;
                }else{
                    $interval.cancel( timer );
                    num = 5;
                    $scope.text = '获取验证码';
                    $scope.isDisabled = false;
                }
            }

        }]);

    </script>
</head>
<body ng-controller="ctrl">

    <input type="button" ng-value=" text + '-表达式' " value="获取验证码" ng-disabled="isDisabled" ng-click="getCode( isDisabled )">
    <input type="text" value="{{text}}" ng-readonly="isDisabled">
    <input type="checkbox" value="{{text}}" ng-checked="isDisabled">
    <input type="radio" value="{{text}}" ng-checked="isDisabled">

    <!--
        使用ng-value 和 ng-bind
        可以避免一开始没有写入数据和显示两花括号的样子，用户体验优化
        注意：ng-value形式不能加花括号，同样可以是表达式
    -->

    <script>
        alert( '用户体验延迟' );
    </script>
</body>
</html>
