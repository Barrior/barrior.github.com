<!DOCTYPE html>
<html lang="en" ng-app="app">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        *{
            box-sizing: border-box;
        }
        body, input{
            font: 14px/1.5 "微软雅黑";
        }
        form{
            width: 300px;
            margin: 50px auto;
        }
        input{
            display: block;
            width: 100%;
            height: 32px;
            line-height: 32px;
            padding: 0 10px;
        }
        input[type=submit]{
            border: none;
            border-radius: 4px;
            background-color: #2bdc68;
            color: #fff;
            cursor: pointer;
        }
        input.ng-valid{
            border: 1px solid green;
        }
        input.ng-invalid{
            border: 1px solid red;
        }
        aside{
            margin: 18px 0;
        }
        .title{
            display: inline-block;
            width: 76px;
            text-align: right;
        }
        .hint{
            margin-top: 4px;
            color: red;
        }
    </style>
    <script src="js/angular.min.js"></script>
    <script>
        var app = angular.module('app', []);
        app.controller('form', ['$scope', function( $scope ){

            $scope.emailHint = {
                hint: '',
                required: '请输入邮箱/手机号',
                pattern: '邮箱或手机号输入错误'
            };

            $scope.passwordHint = {
                hint: '',
                required: '请输入6~30位密码',
                minlength: '密码长度不能小于6位',
                maxlength: '密码长度不能大于30位'
            };

            $scope.confirmPassword = angular.extend( {}, $scope.passwordHint );

            $scope.change = function( type, $error ){
                console.log( type, $error );
                if( $error.required ){
                    return $scope[ type ].hint = $scope[ type ].required;
                }
                for( var field in $error ){
                    if( $error[ field ] ){
                        return $scope[ type ].hint = $scope[ type ][ field ];
                    }
                }
                $scope[ type ].hint = '';
            };

            $scope.submit = function(){
                console.log( $scope )
                console.log( $scope.myForm.$valid )
                if( $scope.myForm.$valid ){
                    //提交
                }
            };

        }]);

    </script>
</head>
<body ng-controller="form">

    <!--
        注意：angular提交表单，不需要给form加上action，这样不用阻止默认提交行为
    -->
    <form name="myForm" novalidate ng-submit="submit()">
        <aside>
            <input type="text" name="username" placeholder="请输入邮箱/手机号" required
                   ng-pattern="/^([\w-]+@(\w+\.)+[a-z]+|1\d{10})$/i"
                   ng-model="usernameText"
                   ng-blur="change( 'emailHint', myForm.username.$error )">
            <div class="hint">{{ emailHint.hint }}</div>
        </aside>

        <aside>
            <input type="password" name="password" placeholder="请输入6~30位密码" required
                   ng-minlength="6"
                   ng-maxlength="30"
                   ng-model="passwordText"
                   ng-blur="change( 'passwordHint', myForm.password.$error )">
            <div class="hint">{{ passwordHint.hint }}</div>
        </aside>

        <aside>
            <input type="password" name="confirmPassword" placeholder="确认密码" required
                   ng-minlength="6"
                   ng-maxlength="30"
                   ng-model="confirmPasswordText"
                   ng-blur="change( 'confirmPassword', myForm.confirmPassword.$error )">
            <div class="hint">{{ confirmPassword.hint }}</div>
            <div class="hint" ng-show="
                myForm.password.$valid &&
                myForm.confirmPassword.$valid &&
                (passwordText !== confirmPasswordText)
            ">
                两次密码输入不一致
            </div>
        </aside>

        <aside>
            <input type="submit" value="登录">
        </aside>
    </form>

</body>
</html>
