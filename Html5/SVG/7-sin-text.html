			//y = s * sin( α*x + 2πk );
			
			var oText=document.querySelector('text');
				n=oText.textContent.length;	//26个英文字母的长度
				dx=[];
				dy=[];
				
				i=n;
				s=100;
				w=0.02;
				t=0;
			
			while(n--){
				dx.push(10);
			}
			
			function range(t){
					ly=0;
					cy=undefined;
				
				for(i=0; i<n; ++i){
					cy=-s*Math.sin( w*i*20 + t );
					y.push(cy-ly);
					ly=cy;
				}
			}
			
			function render(){
				oText.setAttribute('dx',dx.join(','));
				oText.setAttribute('dy',dy.join(','));
			}
			range();
			render()
