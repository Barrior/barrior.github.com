<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>k-show</title>
		<style>
			html,body{width: 100%; height: 100%; margin: 0; overflow: hidden;}
			#container{width: 80%; height: 80%; border: 1px solid black; margin: 20px;}
		</style>
	</head>
	<body>
		<div id="container"></div>
		
		<script src="d3.min.js" ></script>
		<script src="KData.js"></script>
		<script src="KChart.js"></script>
		<script src="tip.js"></script>
		<link href="tip.css" rel="stylesheet" />
		<script>
		/*
			 [1415894400000,"10.88","10.98","10.75","10.91"]
			   时间戳，开盘，最高，最低，收盘
			 time，open，high，low，close
		*/
			(function(){
				console.time(1)
				Y.KChart('#container',KData);
				console.timeEnd(1)
				
				window.onresize=function(){
					d3.select('svg').remove();
					Y.KChart('#container',KData)
				}
			})();
		</script>
	</body>
</html>
