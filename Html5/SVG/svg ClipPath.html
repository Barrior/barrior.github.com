<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<style>
			html,body{width: 100%; height: 100%; margin: 0; overflow: hidden;}
		</style>
	</head>
	<body>
		<svg width=100% height=100% >
			<defs>
				<clipPath id="c-path-1">
					<circle cx=500 cy=400 r=200></circle>
				</clipPath>
				<clipPath id="c-text">
					<text x=100 y=80 font-size=3em font-family="微软雅黑">Hello Fuck</text>
				</clipPath>
			</defs>
			
			<image
				xlink:href="http://www.51ztzj.com/upload/image/20131115/dn201311152023_1920x1080.jpg"
				width="100%"
				height="100%"
				clip-path="url(#c-path-1)">
			</image>
			
			<image
				xlink:href="http://www.51ztzj.com/upload/image/20131115/dn201311152023_1920x1080.jpg"
				width="500"
				height="300"
				clip-path="url(#c-text)">
			</image>
		</svg>
		<script>
			var oC=document.querySelector('#c-path-1 circle');
			
			document.onmousemove=function(ev){
				oC.setAttribute('cx', ev.clientX );
				oC.setAttribute('cy', ev.clientY );
			}
		</script>
	</body>
</html>
