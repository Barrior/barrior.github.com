<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<style type="text/css">
			html,body{
				margin: 0;
				padding: 0;
				width: 100%;
				height: 100%;
				background-color: #001122;
				overflow: hidden;
			}
		</style>
	</head>
	<body>
		<svg width=100% height=100%>
			<defs>
				<!--
                	radialGradient:
                		通过(x1,y1)向(x2,y2)两点的连线做线性渐变的方向
                		gradientTransform=rotate(45):可以同样改变渐变方向
                -->
				<linearGradient id="top-to-bottom" x1="0" y1="0" x2="0" y2="1">
					<stop offset="0" stop-color="white"></stop>
					<stop offset="1" stop-color="black"></stop>
				</linearGradient>
				<linearGradient id="bottom-to-top" x1="0" y1="1" x2="0" y2="0">
					<stop offset="0" stop-color="white"></stop>
					<stop offset="1" stop-color="black"></stop>
				</linearGradient>
				
				<linearGradient id="left-to-right" x1="0" y1="0" x2="1" y2="0">
					<stop offset="0" stop-color="white"></stop>
					<stop offset="1" stop-color="black"></stop>
				</linearGradient>
				<linearGradient id="right-to-left" x1="1" y1="0" x2="0" y2="0">
					<stop offset="0" stop-color="white"></stop>
					<stop offset="1" stop-color="black"></stop>
				</linearGradient>
				
				<linearGradient id="angle45" x1="1" y1="0" x2="0" y2="1">
					<stop offset="0" stop-color="white"></stop>
					<stop offset="1" stop-color="black"></stop>
				</linearGradient>
				<linearGradient id="angle45-2" gradientTransform=rotate(135)>
					<stop offset="0" stop-color="white"></stop>
					<stop offset="1" stop-color="black"></stop>
				</linearGradient>
				<linearGradient id="angle">
					<stop offset="0" stop-color="white"></stop>
					<stop offset="1" stop-color="black"></stop>
				</linearGradient>
				
				<!--
                	radialGradient:
                		cx/cy:镜像渐变【圆】相对引用它的元素的偏移值，默认50%，就是中心
                		fx/fy:镜像渐变【圆心点】相对引用它的元素的偏移值，默认50%
                		r:圆半径
                -->
				<radialGradient id="rg" fx=50% fy=0 r=50% cx="50%" cy="50%">
					<stop offset="0" stop-color="white"></stop>
					<stop offset="1" stop-color="black"></stop>
				</radialGradient>
			</defs>
			
			<!--linearGradient Demo-->
			<rect x=50 y=50 width=100 height=60 fill=url(#top-to-bottom)></rect>
			<rect x=200 y=50 width=100 height=60 fill=url(#bottom-to-top)></rect>
			<text x=100 y=130 fill=#fff text-anchor=middle>top-to-bottom</text>
			<text x=250 y=130 fill=#fff text-anchor=middle>bottom-to-top</text>
			
			<rect x=50 y=180 width=100 height=60 fill=url(#left-to-right)></rect>
			<rect x=200 y=180 width=100 height=60 fill=url(#right-to-left)></rect>
			<text x=100 y=260 fill=#fff text-anchor=middle>left-to-right</text>
			<text x=250 y=260 fill=#fff text-anchor=middle>right-to-left</text>
			
			<rect x=50 y=310 width=100 height=60 fill=url(#angle45)></rect>
			<rect x=200 y=310 width=100 height=60 fill=url(#angle45-2)></rect>
			<rect x=350 y=310 width=100 height=60 fill=url(#angle)></rect>
			<text x=100 y=390 fill=#fff text-anchor=middle>顺时针45°角</text>
			<text x=250 y=390 fill=#fff text-anchor=middle>顺时针135°角</text>
			<text x=400 y=390 fill=#fff text-anchor=middle>任意角度</text>
			
			<!--radialGradient Demo-->
			<rect x=50 y=450 width="200" height="200" fill="url(#rg)"></rect>
		</svg>
		<script>
			var oLG=document.querySelector('#angle'), i=0;
			setInterval(function(){
				i++;
				oLG.setAttribute('x1', Math.sin(i*Math.PI/180) );
				oLG.setAttribute('y1', Math.cos(i*Math.PI/180) );
			},30)
			
			oLG.setAttribute('x2',0.5);
			oLG.setAttribute('y2',0.5);
		</script>
		
	</body>
</html>
