<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
	</head>
	<body>
		<svg id="svg" width="100%" height="600px">
			<text x=500 y=100 fill=black>text</text>
			<rect y=100 width=100 height=100></rect>
			<image width="46" height="36"></image>
		</svg>
		
		<script>
			var oSvg=document.getElementById('svg');
				oText=document.getElementsByTagName('text')[0];
				oRect=document.querySelector('rect');
				oImg=document.querySelector('image');
			
			//创建元素：
			oCircle=document.createElementNS('http://www.w3.org/2000/svg','circle');
			
			//改变文本(兼容ie)：
			oText.textContent='new text';
			
			//设置特殊属性：
			oImg.setAttributeNS('http://www.w3.org/1999/xlink','xlink:href','car.png');
			
			//获取元素属性的两种方法：getAttribute(), getBBox(), 都可以获取宽高和坐标
			console.log( oRect.getAttribute('width') );	//返回字符串类型
			console.log( oRect.getBBox().width );	//返回数字类型
			
		</script>
	</body>
</html>
