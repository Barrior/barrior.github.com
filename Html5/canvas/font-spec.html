<body>
	<canvas id="c" width="1300px" height="1050px"></canvas>
  <script>
    function degreeToRadian(deg) {
      return deg * (Math.PI / 180)
    }
  </script>
	<script>
		const canvas = document.getElementById('c')
		const ctx = canvas.getContext('2d')
    const cw = canvas.width
    const ch = canvas.height

    const x = 100
    const y = 200
    const text = '春季焕新Spydfhlinx'

    const fontSize = 100 // 20.46209 * 4.837906953213038

    ctx.font = `${fontSize}px FZLTTHK--GBK1-0`
    // ctx.textBaseline = 'alphabetic'
    ctx.textBaseline = 'top'
    ctx.textAlign = 'start'
    ctx.lineJoin = 'round'

    const { actualBoundingBoxAscent } = ctx.measureText(text)
    console.log('fontSize: ', fontSize)
    // console.log(ctx.measureText(text))

    setTimeout(() => {
      let left = 0
      for (let i = 0; i < text.length; i++) {
        const char = text[i]
        const { width } = ctx.measureText(char)
        ctx.fillText(char, x + left, y + actualBoundingBoxAscent)
        left += width
        if ('春yd'.includes(char)) {
          console.log('char: ', char)
          console.log(ctx.measureText(char))
        }
      }

      ctx.fillText(text, x, y + 200)
    }, 100)

    ctx.moveTo(0, y + 0.5)
    ctx.lineTo(cw, y + 0.5)
    ctx.moveTo(x + 0.5, 0)
    ctx.lineTo(x + 0.5, ch)

    ctx.moveTo(0, y + fontSize)
    ctx.lineTo(cw, y + fontSize)
    ctx.moveTo(x + fontSize, 0)
    ctx.lineTo(x + fontSize, ch)

    ctx.moveTo(x * 4 + fontSize, 0)
    ctx.lineTo(x * 4 + fontSize, ch)
    ctx.moveTo(x * 5 + fontSize, 0)
    ctx.lineTo(x * 5 + fontSize, ch)
    ctx.stroke()
	</script>
