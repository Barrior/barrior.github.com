<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Document</title>
	<style type="text/css">
		body {
			padding-top: 40px;
			background: #000;
			text-align: center;
		}
		#c {
			background: #fff;
		}
	</style>
</head>
<body>
	<canvas id="c" width="500px" height="300px"></canvas>
	<script>
		const canvas = document.getElementById('c')
		const ctx = canvas.getContext('2d')

    const x = 130
    const y = 180
    const text = '甜糯米'

    // [font style][font weight][font size][font face] 同 CSS 一样，少了字体大小和字体名字都不行
    ctx.font = 'bold 80px 微软雅黑'

    ctx.save()
    ctx.shadowColor = 'rgb(255, 231, 58)'
    ctx.shadowOffsetX = 0
    ctx.shadowOffsetY = 0
    ctx.shadowBlur = 30

    ctx.strokeStyle = 'rgb(255, 224, 0)'
    ctx.lineWidth = 6.5 * 2
    ctx.strokeText(text, x, y)
    ctx.restore()

    ctx.strokeStyle = 'white'
    ctx.lineWidth = 4.5 * 2
    ctx.strokeText(text, x, y)

    ctx.fillStyle = 'rgb(255, 224, 0)'
    ctx.fillText(text, x, y)
	</script>
</body>
</html>
