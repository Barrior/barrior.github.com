<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Document</title>
	<style type="text/css">
		body{
			padding-top: 40px;
			background: #000;
			text-align: center;
		}
		#c{
			background: #fff;
		}
	</style>
</head>
<body>
	<canvas id="c" width="500px" height="300px"></canvas>

	<script>
		'use strict';

		var canvas = document.getElementById( 'c' );
		var gc = canvas.getContext( '2d' );

		var cw = canvas.width;
		var ch = canvas.height;
		var num = 0;

		function draw(){

			gc.clearRect( 0, 0, cw, ch );

			gc.arc( cw/2, ch/2, 100, 0, 2 * Math.PI, false );
			gc.fillStyle = '#ccc';
			gc.fill();

			gc.beginPath();
			gc.arc( cw/2, ch/2, 90, -90 * Math.PI / 180, (num / 100 * 360 - 90) * Math.PI / 180, false );
			gc.strokeStyle = 'red';
			gc.lineWidth = 20;
			gc.stroke();

			gc.beginPath();
			gc.arc( cw/2, ch/2, 90, 0, 2 * Math.PI, false );
			gc.fillStyle = '#fff';
			gc.fill();

			gc.font = 'bold 30px 微软雅黑';
			gc.textAlign = 'center';
			gc.textBaseline = 'middle';
			gc.fillStyle = '#000';
			gc.fillText( num + '%', cw/2, ch/2 );

			if( num < 80 ){

				num += 2;
				requestAnimationFrame( draw );

			}
		}

		requestAnimationFrame( draw );


	</script>
</body>
</html>
