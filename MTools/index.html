<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Mobile工具库演示及使用说明</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
		<link rel="stylesheet"  href="tools.css"><!--引入工具库需要使用到的css文件-->
		<link rel="stylesheet" href="demo.css" />
		<script src="zepto.js"></script><!--必须先引入zepto.js框架-->
		<script src="tools.js"></script><!--接着引入工具库所使用到的js文件-->
		<script>
			$(function(){
				$('#to-top').on('touchend',function(){
					D.toTop();
				});
				
				$('#alert').on('touchend',function(){
					D.alert({
						content:'css3动画模拟alert框'
					});
				});
				
				$('#confirm').on('touchend',function(){
					D.confirm({
						content:'很多很多内容内容内容内容内容内容内容内容内容内容内容内容内容内容内容',	//必需
						fOk:function(){
							D.alert({content:'你点击的是confirm确定'})
						},	//可选，点击【确定】后执行的函数
						fCancel:function(){
							D.alert({content:'你点击的是取消'})
						}	//可选，点击【取消】后执行的函数
					});
				});
			});
		</script>
	</head>
	<body>
		<div id="to-top">返回顶部</div>
		<span id="alert">alert框</span>
		<span id="confirm">confirm框</span>
	</body>
</html>
