<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ng</title>
    <script src="js/angular.min.js"></script>
    <script>
        var app1 = angular.module('app1', []);
        app1.controller('nameCtrl', ['$scope', function($scope) {
            $scope.name = 'Barrior';
        }]);

        var app2 = angular.module('app2', []);
        app2.controller('nameCtrl', ['$scope', function($scope) {
            $scope.age = 23;
        }]);

        document.onclick = function () {
            var div = document.getElementsByTagName('div');
            //如果在元素自身上用指令初始化应用程序，指令只会初始化第一个应用，
            //所以用js主动触发，可以初始化自定义的应用程序
            angular.bootstrap( div[0], ['app1'] );
            angular.bootstrap( div[1], ['app2'] );
        }
    </script>
</head>
<body>
    <div ng-controller="nameCtrl">
        {{name}}
    </div>
    <div ng-controller="nameCtrl">
        {{age}}
    </div>
</body>
</html>
