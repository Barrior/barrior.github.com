<!DOCTYPE html>
<html ng-app="app">
<head>
    <meta charset="UTF-8">
    <title>ng</title>
    <script src="js/angular.min.js"></script>
    <!--引入服务模块-->
    <script src="js/arr-module.js"></script>
    <script>
        //模块化，amd规范，依赖arrModule
        var app = angular.module('app', ['arrModule']);
        app.controller('nameCtrl', ['$scope','myService', function( $scope, myService ) {

            $scope.info = myService.unique( [ 2, 4, 3, 3, 5, 4, 7, 2, 9 ] );

        }]);

    </script>
</head>
<body>
    <div ng-controller="nameCtrl">
        {{ info }}
    </div>
</body>
</html>
