<!DOCTYPE html>
<html ng-app="app">
<head>
    <meta charset="UTF-8">
    <title>ng</title>
    <script src="js/angular.min.js"></script>
    <script>
        let app = angular.module('app', []);
        /*
         factory定义一个arrayExtends服务，
         这样就可以在任何控制器里通过依赖注入的形式使用该服务功能了

         factory创建的服务不能修改默认配置，所以使用provider创建服务更好，可以修改默认配置
         */
        app.factory('arrExtends', () => {
            //可以返回一个对象，也可以返回一个函数，相应的使用即可
            return {
                unique: aData => {
                    let arr = [];
                    let hash = {};
                    if( Array.isArray( aData ) ){
                        aData.forEach( v => {
                            if( !hash[ v ] ){
                                hash[ v ] = [ v ];
                                arr.push( v );
                            }else if( hash[ v ].indexOf( v ) == -1 ){
                                hash[ v ].push( v );
                                arr.push( v );
                            }
                        });
                    }
                    return arr;
                }
            };
        });

        app.controller('nameCtrl', ['$scope', 'arrExtends', ( $scope, arrExtends ) => {

            //数组去重
            $scope.info = arrExtends.unique( [ 2, 4, 3, 3, 5, 4, 7, 2, 9 ] );

        }]);
    </script>
</head>
<body>
    <div ng-controller="nameCtrl">

        <h3> {{ info }} </h3>

    </div>
</body>
</html>
