<!DOCTYPE html>
<html ng-app="app">
<head>
    <meta charset="UTF-8">
    <title>ng</title>
    <script src="js/angular.min.js"></script>
    <script>
        let app = angular.module('app', []);
        /*
         provider创建服务，比factory麻烦了一点，不过可配置
         */
        app.provider('myService', function(){
            return {
                name: 'Barrior',
                $get: function(){
                    return {
                        //注意，这里用的this，才能使得provider修改这里的值
                        name: this.name,
                        showName: function(){
                            return this.name;
                        }
                    }
                }
            }
        });

        app.config(['myServiceProvider', function( myServiceProvider ){
            console.log( myServiceProvider )
            myServiceProvider.name = 'myServiceProvider-name'
        }]);

        app.controller('nameCtrl', ['$scope', 'myService', ( $scope, myService ) => {

            $scope.info = myService.showName();

        }]);
    </script>
</head>
<body>
    <div ng-controller="nameCtrl">

        <h3> {{ info }} </h3>

    </div>
</body>
</html>
