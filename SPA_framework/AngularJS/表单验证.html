<!DOCTYPE html>
<html lang="en" ng-app="app">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        input.ng-valid{
            border: 1px solid green;
        }
        input.ng-invalid{
            border: 1px solid red;
        }
    </style>
    <script src="js/angular.min.js"></script>
    <script>
        var app = angular.module('app', []);
        app.controller('form', ['$scope', function( $scope ){

            $scope.emailText = 'Barrior@qq.com';

        }]);

    </script>
</head>
<body ng-controller="form">

    //novalidate阻止表单的默认行为样式，如type="email"的验证错误时，firefox浏览器会自动加上红色样式
    <form action="#" method="get" name="myForm">
        <p>
            <input type="email" name="email" placeholder="请输入邮箱" required
                   ng-minlength="5"
                   ng-maxlength="100"
                   ng-pattern="/^[\w-]+@(\w+\.)+[a-z]+$/"
                   ng-model="emailText">
            <!--
                $valid: 有效的，当表单验证通过时返回true，反之返回false
                    与$invalid相反

                $pristine: 原始值，输入的值被修改过就返回false，反之返回true
                    与$dirty相反

                $error: 错误信息，大型应用比较适用

                注意：通过name的方式进行查找，
                     要写ng-model
            -->
            <div>$valid : {{ myForm.email.$valid }}</div>
            <div>$invalid : {{ myForm.email.$invalid }}</div>
            <div>$pristine : {{ myForm.email.$pristine }}</div>
            <div>$dirty : {{ myForm.email.$dirty }}</div>
            <div>$error : {{ myForm.email.$error }}</div>
        </p>
    </form>

</body>
</html>
