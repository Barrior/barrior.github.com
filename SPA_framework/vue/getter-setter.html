<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Document</title>
</head>
<body>
	<script type="text/javascript">
		//ie9+
		//通过set去设置，会有多余的属性，才能在get的时候，返回set设置的数据
		//redundant多余的
		var person = {
			name: 'barrior',
			get sex(){
				return this.sexVal || 'male';
			},
			/*set sex( sex ){
				this.sexVal = sex;
			}*/
		};

		alert( person.sex )

		person.__defineSetter__('setSex', function( val ){
			this.sexVal = val;
		});

		// person.sex = 'female';
		person.setSex = 'female';
		alert( person.sex )

		var person2 = {
			name: 'Barrior'
		};

		person2.__defineSetter__('setName', function( name ){
			this.name = name;
		});

		alert( person2.name );	//Barrior

		person2.setName = 'keenwon';
		alert( person2.name );	//keenwon

	</script>
</body>
</html>
