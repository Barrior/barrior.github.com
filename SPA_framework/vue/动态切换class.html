<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        #app{
            display: inline-block;
            padding: 4px 8px;
            background-color: #999;
            font: 14px/1.5 normal "微软雅黑";
            color: #fff;
        }
        #app.red{
            background-color: red;
        }
        #app.green{
            background-color: green;
        }
        #app.blue{
            background-color: blue;
        }
    </style>
</head>
<body>
    <div id="app" v-bind:class="{ 'red': isRed, 'green': isGreen, 'blue': isBlue }">
        我会按钮，我会切换颜色哟~
    </div>

    <script src="js/vue.js"></script>
    <script>
        var vm = new Vue({
            el: '#app',
            data: {
                isRed: true,
                isGreen: false,
                isBlue: false
            }
        });

        var color = [ 'isRed', 'isGreen', 'isBlue' ];
        var i = 0;

        function changeColor(){
            setTimeout(function(){
                color.forEach(function( v ){
                    vm[ v ] = false;
                });
                vm[ color[ i % 3 ] ] = true;
                i++;
                changeColor();
            }, 1000 );
        }
        changeColor();
    </script>
</body>
</html>
