<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <div id="app">
        <h3>
            a = {{ a }}, b = {{ b }}
        </h3>
    </div>

    <script src="js/vue.js"></script>
    <script>
        var vm = new Vue({
            el: '#app',
            data: {
                a: 1,
                b: 2
            }
        });

        vm.$watch('a', function( val ){
            this.b = val + 1;
        });

        setTimeout(function(){
            vm.a = 2;
        }, 1000 );
    </script>
</body>
</html>
