<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <div id="app">
        <p>{{ message }}</p>
        <!-- v-on:click 的简写为 @click -->
        <button v-on:click="reverseMessage">逆转消息</button>

        <!-- 按键修饰符，也可以写成 @keyup.enter -->
        <input type="text" @keyup.13="onEnter">

        <ul>
            <todo-item
                v-for="item in list"
                v-bind:data="item"
                v-bind:key="item.id"
            >
            </todo-item>
        </ul>
        <div>{{JSON.stringify(userProfile)}}</div>
    </div>

    <script src="vue.js"></script>
    <script>
        function getLastId() {
            return vm.list[vm.list.length - 1].id + 1;
        }

        Vue.component('todo-item', {
            props: ['data'],
            template: '<li v-bind:id="data.id" @click.ctrl="clickAndCtrl">{{data.text}}</li>',
            methods: {
                clickAndCtrl(e) {
                    console.log(e.target.innerHTML)
                }
            }
        })

        const vm = new Vue({
            el: '#app',
            data: {
                message: 'hello world',
                list: [
                    { id: 0, text: '蔬菜' },
                    { id: 1, text: '奶酪' },
                    { id: 2, text: '随便吃点东西' }
                ],
                userProfile: {
                    name: 'Anika'
                }
            },
            methods: {
                reverseMessage() {
                    this.message = this.message.split('').reverse().join('')
                },
                onEnter(event) {
                    this.list.push({
                        id: getLastId(),
                        text: event.target.value
                    })
                    event.target.value = ''
                    event.target.focus()
                }
            },
            beforeMount() {
                console.log('*** beforeMount ***')
                console.log(document.querySelector('li'))
            },
            mounted() {
                console.log('*** mounted ***')
                console.log(document.querySelector('li'))
            },
            updated() {
                console.log('*** updated ***')
            }
        })

        console.log(vm)

        // 触发 vm.items[indexOfItem] = newValue 更新需要用下面语法替代
        setTimeout(() => {
            Vue.set(vm.list, 2, {id: 2, text: '吃点其他东西'})
            // vm.list.splice(2, 1, '吃点其他东西')
        }, 1000)

        setTimeout(() => {
            vm.list.push({id: getLastId(), text: '新的食物'})

            vm.userProfile = Object.assign(vm.userProfile, {
                name: 'Barrior',
                age: 25
            })
        }, 2000)

        setTimeout(() => {
            // 使用新的数组替代旧的数组，可以达到更新的目的
            vm.list = vm.list.concat({id: getLastId(), text: '汉堡包'})
        }, 3000)

    </script>
</body>
</html>
