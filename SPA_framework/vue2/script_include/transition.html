<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .slide-fade-leave-active {
            background-color: blue;
            transform: translateX(-2em);
        }
        .slide-fade-leave-to {
            /* transition 放在 to 里，active 的样式会动画执行 */
            /* transition 放在 active 里， active 的样式不会动画执行*/
            transition: all .8s ease-out;
            transform: translateX(2em);
            background-color: green;
            opacity: 0;
        }

        .slide-fade-enter-active {
            transition: all .8s ease-out;
            background-color: red;
            opacity: 0;
            transform: translateX(2em);
        }
        .slide-fade-enter-to {
            background-color: yellow;
            transform: translateX(0);
            opacity: 1;
        }

        .flip-list-move {
            transition: transform 1s;
        }
    </style>
</head>
<body>
    <div id="app">
        <button @click="onFade">fade</button>
        <transition name="slide-fade">
            <h3 class="only-single-element-on-top" v-if="show">Show Something</h3>
        </transition>

        <div>
            <button @click="onShuffle">Shuffle</button>
            <transition-group name="flip-list" tag="ul">
                <li v-for="item in items" v-bind:key="item">
                    {{ item }}
                </li>
            </transition-group>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.14.1/lodash.min.js"></script>
    <script src="vue.js"></script>
    <script>
        new Vue({
            el: '#app',
            data: {
                show: true,
                items: [1, 2, 3, 4, 5, 6, 7, 8]
            },
            methods: {
                onFade() {
                    this.show = !this.show
                },
                onShuffle() {
                    this.items = _.shuffle(this.items)
                }
            }
        })
    </script>
</body>
</html>
