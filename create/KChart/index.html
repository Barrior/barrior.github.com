<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>KChart</title>
		<style>
			html,body{width: 100%; height: 100%; margin: 0; overflow: hidden;}
			#container{width: 80%; height: 80%; border: 1px solid black; margin: 20px auto;}
		</style>
	</head>
	<body>
		<div id="container"></div>
		
		<script src="d3.min.js" ></script>
		<script src="KData.js"></script>
		<script src="YCharts.js"></script>
		<script>
		/*
			 [1415894400000,"10.88","10.98","10.75","10.91",2561132.21]
			   时间戳，开盘，最高，最低，收盘，成交量
			 time，open，high，low，close，turnover
		*/
			(function(){
				Y('#container').KChart(KData,{
					hasHist:true,
					cross:true
				});
				
				window.onresize=function(){
					d3.select('svg').remove();
					Y('#container').KChart(KData,{
						hasHist:true,
						cross:true
					});
				}
			})();
		</script>
	</body>
</html>
