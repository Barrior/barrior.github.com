<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Document</title>
	<style type="text/css">
	html,body{
		width: 100%;
		height: 100%;
		margin: 0;
		background: #171717;
		color: #E0E0E0;
		text-align: center;
	}
	#game-name{
		padding: 50px 0 20px;
		margin: 0;
	}
	#box{
		width: 600px;
		height: 400px;
		margin: 0 auto;
		position: relative;
	}
	#score{
		font-size: 20px;
		color: red;
		position: absolute;
		left: 102%;
		top: 0;
	}
	#c{
		background-color: #333;
	}
	#ctrl{
		margin-top: 12px;
	}
	#ctrl b{
		margin-right: 20px;
	}
	</style>
</head>
<body>
	<h1 id="game-name">经典贪吃蛇，看你能玩多少分！</h1>
	<div id="box">
		<canvas id="c" width="600" height="400"></canvas>
		<div id="score">0</div>
	</div>
	<div id="ctrl">
		<b>[ 空格键 ] 开始或暂停</b>
		↑：<small>上</small>
		↓：<small>下</small>
		←：<small>左</small>
		→：<small>右</small>
	</div>


	<script type="text/javascript">
	var c = document.getElementById( 'c' ),
		cxt = c.getContext( '2d' ),

		cw = c.width,
		ch = c.height;

	var girdSize = 20;
	var xGirdNum = cw / girdSize;
	var yGirdNum = ch / girdSize;
	var girdColor = '#444';
	var snakeColor = '#E0E0E0';
	var snake = [];
	var food = {
		x: 0,
		y: 0
	};
	
	cxt.fillStyle = snakeColor;
	cxt.strokeStyle = girdColor;

	function gird(){
		cxt.beginPath();
		for( var i = 1; i < xGirdNum; i++){
			cxt.moveTo( i * girdSize + .5, 0 );
			cxt.lineTo( i * girdSize + .5, ch );
		}
		for( var i = 1; i < yGirdNum; i++){
			cxt.moveTo( 0, i * girdSize + .5 );
			cxt.lineTo( cw, i * girdSize + .5 );
		}
		cxt.stroke();
	}
	function randomPointX(){
		return Math.floor( Math.random() * xGirdNum );
	}
	function randomPointY(){
		return Math.floor( Math.random() * yGirdNum );
	}
	function getPoint(){

	}
	function initSnake(){
		var x = Math.floor( Math.random() * (xGirdNum - 3) * .3 ) + 3;
		var y = Math.floor( Math.random() * yGirdNum );
		for( var i = 0; i < 3; i++ ){
			snake.push({
				x: x - i,
				y: y,
				vx: 1,
				vy: 0
			});
		}
		food.x = Math.floor( Math.random() * (xGirdNum - xGirdNum * .5) + xGirdNum * .5 );
		food.y = Math.floor( Math.random() * yGirdNum );
	}
	function createSnake(){
		cxt.clearRect( 0, 0, cw, ch );
		gird();
		//food
		cxt.fillRect(
			food.x * girdSize + 1, food.y * girdSize + 1,
			girdSize - 1, girdSize - 1
		);
		//snake
		snake.forEach(function( v ){
			/*if( v. ){

			}*/
			v.x += v.vx;
			v.y += v.vy;

			cxt.fillRect(
				v.x * girdSize + 1, v.y * girdSize + 1,
				girdSize - 1, girdSize - 1
			);
		});
	}

	function startSnake(){
		createSnake();
		!paused && moveSnake();
	}
	function moveSnake(){
		setTimeout( startSnake, speed );
	}

	initSnake();
	createSnake();

	var paused = true;
	var speed = 340;

	document.onkeyup = function( e ){
		switch( e.keyCode ){
			//上
			case 38:
				if(  ){

				}
				break;
			//下
			case 40:
				break;
			//左
			case 37:
				break;
			//右
			case 39:
				break;
			//空格
			case 32:
				if( paused ){
					paused = false;
					startSnake();
				}else{
					paused = true;
				}
				break;
		}
	}


	</script>
</body>
</html>
