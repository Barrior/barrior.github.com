<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Document</title>
	<style type="text/css">
	html,body{
		width: 100%;
		height: 100%;
		margin: 0;
		background: #171717;
		color: #E0E0E0;
		text-align: center;
	}
	#game-name{
		padding: 50px 0 20px;
		margin: 0;
	}
	#box{
		width: 600px;
		height: 400px;
		margin: 0 auto;
		position: relative;
	}
	#score{
		font-size: 20px;
		color: red;
		position: absolute;
		left: 102%;
		top: 0;
	}
	#c{
		background-color: #333;
	}
	#ctrl{
		margin-top: 12px;
	}
	#ctrl b{
		margin-right: 20px;
	}
	#game-over{
		width: 100%;
		height: 100%;
		background-color: rgba( 0, 0, 0, .9 );
		position: absolute;
		left: 0;
		top: 0;
	}
	#game-over h1{
		margin: 100px 0 10px;
	}
	#game-over h3{
		margin: 0 0 20px;
		font: bold 70px cursive;
	}
	#btn{
		display: inline-block;
		padding: 6px 20px;
		border: 1px solid #ccc;
		font-size: 20px;
		border-radius: 2px;
		cursor: pointer;
		transition: 600ms;
	}
	#btn:hover{
		background-color: #ddd;
		border-color: #ddd;
		color: #333;
	}
	</style>
</head>
<body>
	<h1 id="game-name">经典贪吃蛇，看你能玩多少分！</h1>
	<div id="box">
		<canvas id="c" width="600" height="400"></canvas>
		<div id="game-over">
			<h1>游戏结束，<small>得分：</small></h1>
			<h3>93</h3>
			<span id="btn">再玩一次</span>
		</div>
		<div id="score">0</div>
	</div>
	<div id="ctrl">
		<b>[ 空格键 ] 开始或暂停</b>
		↑：<small>上</small>
		↓：<small>下</small>
		←：<small>左</small>
		→：<small>右</small>
	</div>


	<script type="text/javascript">
	var c = document.getElementById( 'c' ),
		cxt = c.getContext( '2d' ),

		cw = c.width,
		ch = c.height;

	var girdSize = 20;
	var xGirdNum = cw / girdSize;
	var yGirdNum = ch / girdSize;
	var girdColor = '#444';
	var snakeColor = '#E0E0E0';
	var snake = [];
	var dir = 'r';
	var oldDir = 'r';
	var food = {
		x: 0,
		y: 0
	};
	
	cxt.fillStyle = snakeColor;
	cxt.strokeStyle = girdColor;

	function gird(){
		cxt.beginPath();
		for( var i = 1; i < xGirdNum; i++){
			cxt.moveTo( i * girdSize + .5, 0 );
			cxt.lineTo( i * girdSize + .5, ch );
		}
		for( var i = 1; i < yGirdNum; i++){
			cxt.moveTo( 0, i * girdSize + .5 );
			cxt.lineTo( cw, i * girdSize + .5 );
		}
		cxt.stroke();
	}
	function randomPointX(){
		return Math.floor( Math.random() * xGirdNum );
	}
	function randomPointY(){
		return Math.floor( Math.random() * yGirdNum );
	}
	function initSnake(){
		var x = Math.floor( Math.random() * (xGirdNum - 3) * .3 ) + 3;
		var y = Math.floor( Math.random() * yGirdNum );
		for( var i = 0; i < 3; i++ ){
			snake.push({
				//多了一个初始化时就有的r
				x: x - i - 1,
				y: y
			});
		}
		food.x = Math.floor( Math.random() * (xGirdNum - xGirdNum * .5) + xGirdNum * .5 );
		food.y = Math.floor( Math.random() * yGirdNum );
	}
	function createSnake(){
		cxt.clearRect( 0, 0, cw, ch );
		gird();
		//food
		cxt.fillRect(
			food.x * girdSize + 1, food.y * girdSize + 1,
			girdSize - 1, girdSize - 1
		);

		//蛇身
		for( var i = snake.length-1; i > 0; i-- ){
			var cur = snake[ i ];
			cur.x = snake[ i-1 ].x;
			cur.y = snake[ i-1 ].y;
			cxt.fillRect(
				cur.x * girdSize + 1, cur.y * girdSize + 1,
				girdSize - 1, girdSize - 1
			);
		}
		//蛇头
		var head = snake[ 0 ];
		switch( dir ){
			case 'l':
				head.x--;
				break;
			case 'r':
				head.x++;
				break;
			case 't':
				head.y--;
				break;
			case 'b':
				head.y++;
				break;
		}
		cxt.fillRect(
			head.x * girdSize + 1, head.y * girdSize + 1,
			girdSize - 1, girdSize - 1
		);
		oldDir = dir;
	}

	function startSnake(){
		createSnake();
		!paused && moveSnake();
	}
	function moveSnake(){
		setTimeout( startSnake, speed );
	}

	initSnake();
	createSnake();

	var paused = true;
	var speed = 340;

	document.onkeyup = function( e ){
		switch( e.keyCode ){
			//上
			case 38:
				if( oldDir !== 'b' ){
					dir = 't';
				}
				break;
			//下
			case 40:
				if( oldDir !== 't' ){
					dir = 'b';
				}
				break;
			//左
			case 37:
				if( oldDir !== 'r' ){
					dir = 'l';
				}
				break;
			//右
			case 39:
				if( oldDir !== 'l' ){
					dir = 'r';
				}
				break;
			//空格
			case 32:
				if( paused ){
					paused = false;
					startSnake();
				}else{
					paused = true;
				}
				break;
		}
	}


	</script>
</body>
</html>
