<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

    <script src="matter.js"></script>
    <script>
        const {
            Engine, Render, World, Bodies,
            MouseConstraint
        } = Matter;

        // create an engine
        const engine = Engine.create();

        // create a renderer
        const render = Render.create({
            element: document.body,
            engine: engine,
            options: {
                wireframes: false
            }
        });

        const boxA = Bodies.rectangle(400, 50, 50, 50, {isStatic: true});
        const boxB = Bodies.rectangle(450, 50, 80, 80);

        const constraint = MouseConstraint.create(engine, {
            element: render.canvas
        });

        World.add(engine.world, [boxA, boxB, constraint]);

        // render
        Engine.run(engine);
        Render.run(render);
    </script>
</body>
</html>
