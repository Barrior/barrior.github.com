<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<style>
			html,body,div{width: 100%; height: 100%; margin: 0; padding: 0;}
		</style>
		<script src="http://api.map.baidu.com/api?v=2.0&ak=37bf1ebdbf408e1dd786cabf3523b256"></script>
		<script>
			if(navigator.geolocation){
				navigator.geolocation.getCurrentPosition(success,error,{enableHighAccuracy:true})//enableHighAccuracy:是否返回更详细更准确的定位，默认为false不启用，选择true则启用，但是会导致较长的响应时间及增加功耗。
			}else{
				alert('您的浏览器不支持地理定位！')
			}
			function success(pos){
				var la=pos.coords.latitude, //获取用户的纬度
					lo=pos.coords.longitude; //获取用户经度
				// 百度地图API功能
				var map = new BMap.Map("map");
				var point = new BMap.Point(lo,la);	//将获取的经纬度放置百度地图中
				map.centerAndZoom(point, 15);
				map.addControl(new BMap.NavigationControl());  //添加默认缩放平移控件
				var marker = new BMap.Marker(point);  // 创建标注
				map.addOverlay(marker);              // 将标注添加到地图中
				marker.setAnimation(BMAP_ANIMATION_BOUNCE); //跳动的动画
				map.enableScrollWheelZoom(true);//鼠标缩放
			}
			function error(err){
				err.code==1?alert('如果您想获得更好的用户体验，请允许获取地理位置信息'):alert('获取地理位置时发生错误，请尝试刷新重新获取')
			}
		</script>
	</head>
	<body>
		<div id="map"></div>
	</body>
</html>
