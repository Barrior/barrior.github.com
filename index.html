    <style>
        *{
            -webkit-box-sizing: border-box;
            -moz-box-sizing: border-box;
            box-sizing: border-box;
        }

        body{
            font: 14px/2 "微软雅黑";
        }

        #container{
            width: 400px;
            margin: 50px auto;
        }

        section{
            margin-bottom: 1em;
            border: 1px solid green;
            border-radius: 4px;
        }

        h2,
        section{
            opacity: 0;
            -webkit-animation: bounceIn 1s ease-in-out forwards;
            -moz-animation: bounceIn 1s ease-in-out forwards;
            animation: bounceIn 1s ease-in-out forwards;
        }

        section:nth-of-type( 2 ){
            -webkit-animation-delay: .2s;
            -moz-animation-delay: .2s;
            animation-delay: .2s;
        }

        section:nth-of-type( 3 ){
            -webkit-animation-delay: .3s;
            -moz-animation-delay: .3s;
            animation-delay: .3s;
        }

        section:nth-of-type( 4 ){
            -webkit-animation-delay: .4s;
            -moz-animation-delay: .4s;
            animation-delay: .4s;
        }

        section:nth-of-type( 5 ){
            -webkit-animation-delay: .5s;
            -moz-animation-delay: .5s;
            animation-delay: .5s;
        }

        @-webkit-keyframes bounceIn{
            from{
                -webkit-transform: scale( 0 );
                opacity: 1;
            }
            33.3333%{
                -webkit-transform: scale( 1.3 );
            }
            66.6666%{
                -webkit-transform: scale( .9 );
            }
            to{
                -webkit-transform: scale( 1 );
                opacity: 1;
            }
        }

        @-moz-keyframes bounceIn{
            from{
                -moz-transform: scale( 0 );
                opacity: 1;
            }
            33.3333%{
                -moz-transform: scale( 1.3 );
            }
            66.6666%{
                -moz-transform: scale( .9 );
            }
            to{
                -moz-transform: scale( 1 );
                opacity: 1;
            }
        }

        @keyframes bounceIn{
            from{
                transform: scale( 0 );
                opacity: 1;
            }
            33.3333%{
                transform: scale( 1.3 );
            }
            66.6666%{
                transform: scale( .9 );
            }
            to{
                transform: scale( 1 );
                opacity: 1;
            }
        }

        h3{
            padding-left: 10px;
            margin: 0;
            background-color: green;
            font-size: 16px;
            font-weight: normal;
            line-height: 2.5;
            color: #fff;
            cursor: pointer;
        }

        a{
            display: block;
            height: 0;
            padding: 0 10px;
            line-height: 38px;
            text-decoration: none;
            color: #000;
            outline: none;
            overflow: hidden;
        }

        a:hover{
            background-color: green;
            color: #fff;
        }

        #love div{
            height: 0;
            overflow: hidden;
        }

        #love footer{
            text-align: right;
        }

        #love.show div{
            height: 76px;
            padding: 10px;
        }

        .show a{
            height: 38px;
            margin: 6px 0;
        }

        a,
        #love div{
            -webkit-transition: .4s ease-out;
            -moz-transition: .4s ease-out;
            transition: .4s ease-out;
        }

        @media all and ( max-width: 1024px ){
            
            #container{
                width: 80%;
            }

            #love.show div{
                height: auto;
            }

        }
    </style>

    <script>
        
        'use strict';

        document.documentElement.onclick = function( e ){

            if( e.target.tagName === 'H3' ){

                document.querySelector( '.show' ).removeAttribute( 'class' );
                e.target.nextElementSibling.className = 'show';

            }

        };

        document.getElementsByTagName( 'h2' )[ 0 ].onclick = function(){

            alert( '骗你的，(*^__^*) 嘻嘻……\n功能还在开发中\\(≧▽≦)/' );

        };

        if( !supports( 'animation' ) ){

            var elem = document.getElementsByTagName( 'section' ),
                len = elem.length;

            while( len-- ){

                elem[ len ].style.opacity = 1;

            }

        }

        function supports( attr ){

            var prefix = 'webkit moz ms o'.split( ' ' ),
                length = prefix.length,

                style = document.body.style;

            supports =  function( attr ){

                if( attr in style ){

                    return true;

                }

                attr = attr.replace( /^[a-z]/, function( val ){

                    return val.toUpperCase();

                });

                var len = length;

                while( len-- ){

                    if( prefix[ len ] + attr in style ){

                       return true;

                    }

                }

                return false;

            };

            return supports( attr );
        }
        
    </script>
