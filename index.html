<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
    <title>Barrior Projects</title>
    <style>
        *{
            -webkit-box-sizing: border-box;
            -moz-box-sizing: border-box;
            box-sizing: border-box;
        }

        body{
            font: 14px/2 "微软雅黑";
        }

        #container{
            width: 400px;
            margin: 50px auto;
        }

        section{
            margin-bottom: 1em;
            border: 1px solid green;
            border-radius: 4px;
        }

        h3{
            padding-left: 10px;
            margin: 0;
            background-color: green;
            font-size: 16px;
            font-weight: normal;
            line-height: 2.5;
            color: #fff;
            cursor: pointer;
        }

        a{
            display: block;
            height: 0;
            padding: 0 10px;
            line-height: 38px;
            text-decoration: none;
            color: #000;
            overflow: hidden;
        }
        a:hover{
            background-color: green;
            color: #fff;
        }

        #love div{
            height: 0;
            overflow: hidden;
        }
        #love footer{
            text-align: right;
        }
        #love.show div{
            height: 76px;
            padding: 10px;
        }

        .show a{
            height: 38px;
            margin: 6px 0;
        }

        a,
        #love div{
            -webkit-transition: .4s ease-out;
            -moz-transition: .4s ease-out;
            transition: .4s ease-out;
        }

        @media all and ( max-width: 1024px ){
            
            #container{
                width: 80%;
            }

            #love.show div{
                height: auto;
            }

        }
    </style>
    <base target="_blank"></base>
</head>
<body>
    <div id="container">

        <h2>Barrior Projects:</h2>

        <section>
            <h3>Html5新特性</h3>
            <nav class="show">
                <a href="KChart/index.html">SVG可视化图表开发之K线图</a>
                <a href="player/index.html">WEB播放器</a>
                <a href="Drag-sorting.html">H5拖拽排序</a>
                <a href="notification/index.html">桌面提醒功能：Notification</a>
                <a href="geolocation.html">定位导航：Geolocation</a>
            </nav>
        </section>

        <section>
            <h3>jQuery插件</h3>
            <nav>
                <a href="DDSort/demo.html">jQuery拖拽排序插件：DDSort</a>
                <a href="#">图片懒加载插件：ImgLazyLoad</a>
                <a href="MTools/index.html">移动端Zpeto对话框插件</a>
                <a href="#">仿3D焦点图特效</a>
                <a href="#">瀑布流</a>
            </nav>
        </section>

        <section>
            <h3>如果设计</h3>
            <nav>
                <a href="404/404.htm">404模板页</a>
                <a href="#">柯睿创意设计官网，视觉交互设计</a>
                <a href="#">css3 loading动画</a>
            </nav>
        </section>

        <section>
            <h3>2099释义</h3>
            <nav id="love">
                <div>
                    2099.Gift：爱你永久，是我能送给你的最好礼物！
                    <footer> -- Barrior</footer>
                </div>
            </nav>
        </section>

    </div>
    
    <script>

        document.onclick = function( e ){

            if( e.target.tagName === 'H3' ){

                document.querySelector( '.show' ).removeAttribute( 'class' );
                e.target.nextElementSibling.className = 'show';

            }

        };

    </script>
</body>
</html>
