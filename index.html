<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>2099.Gift Love You Forever</title>
    <style>
    html {
        font-size: 12px;
    }
    
    @media all and ( max-width: 1023px) {
        html {
            font-size: 8px;
        }
    }

    @media all and ( max-width: 374px) {
        html {
            font-size: 6px;
        }
    }
    
    body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding-top: 3em;
        font: 3rem/2 "微软雅黑";
        text-align: center;
        text-shadow: 0 .06em 0 #fff, 0 .12em 0 #ccc;
    }
    
    span {
        font-size: 3.3rem;
    }
    
    #wrap {
        display: inline-block;
    }
    
    #domain {
        font: 3.4rem arial;
    }
    
    #domain,
    #gift,
    #love {
        opacity: 0;
        -webkit-transform: translate( 0, -1.4em);
        -moz-transform: translate( 0, -1.4em);
        transform: translate( 0, -1.4em);
        -webkit-animation: domain 1.4s .1s forwards;
        -moz-animation: domain 1.4s .1s forwards;
        animation: domain 1.4s .1s forwards;
    }
    
    #love {
        -webkit-animation-delay: .5s;
        -moz-animation-delay: .5s;
        animation-delay: .5s;
    }
    
    #gift {
        -webkit-animation-delay: .9s;
        -moz-animation-delay: .9s;
        animation-delay: .9s;
    }
    
    #by {
        margin: 2em;
        text-align: right;
        font-size: 1.2rem;
        opacity: 0;
        transform: translate( -1.4em, 0);
        -webkit-animation: by 1s 1.3s forwards;
        -moz-animation: by 1s 1.3s forwards;
        animation: by 1s 1.3s forwards;
    }
    
    @-webkit-keyframes domain {
        0% {
            opacity: 0;
            -webkit-transform: translate( 0, -1.4em);
        }
        100% {
            opacity: 1;
            -webkit-transform: translate( 0, 0);
        }
    }
    
    @-moz-keyframes domain {
        0% {
            opacity: 0;
            -moz-transform: translate( 0, -1.4em);
        }
        100% {
            opacity: 1;
            -moz-transform: translate( 0, 0);
        }
    }
    
    @keyframes domain {
        0% {
            opacity: 0;
            transform: translate( 0, -1.4em);
        }
        100% {
            opacity: 1;
            transform: translate( 0, 0);
        }
    }
    
    @-webkit-keyframes by {
        0% {
            opacity: 0;
            -webkit-transform: translate( -1.4em, 0);
        }
        100% {
            opacity: 1;
            -webkit-transform: translate( 0, 0);
        }
    }
    
    @-moz-keyframes by {
        0% {
            opacity: 0;
            -moz-transform: translate( -1.4em, 0);
        }
        100% {
            opacity: 1;
            -moz-transform: translate( 0, 0);
        }
    }
    
    @keyframes by {
        0% {
            opacity: 0;
            transform: translate( -1.4em, 0);
        }
        100% {
            opacity: 1;
            transform: translate( 0, 0);
        }
    }
    </style>
</head>

<body>
    <div id="wrap">
        <div id="domain">
            2099<span>.Gift</span>
        </div>
        <div id="love">爱你永久</div>
        <div id="gift">，这是我能送给你的最好礼物！</div>
        <div id="by">--By Lover</div>
    </div>
</body>

</html>
