<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
	</head>
	<body style="margin: 0; height: 2000px;">
		<div id="div1" style="width: 100px; padding: 10px; height: 100px;">
			<div style="width: 100; height: 200px; background: red;"></div>
		</div>
		
		<script>
			/*
			 * 只有元素才有宽高，对象(document)没有宽高之说
			 * 
			 * document.documentElement.clientWidth/clientHeight
			 * 		文档对象下的文档的可视宽高
			 * 	
			 * document.documentElement.offsetWidth/offsetHeight
			 * 		文档的实际宽高，ie却等于可视宽高
			 * 		用document.body.offsetHeight处理兼容
			 * 
			 * document.documentElement.scrollWidth/scrollHeight
			 * 		文档元素的宽高，ie，ff最小为可视宽高，chrome为页面仅有的内容的宽高
			 * 
			 * document.body.scrollWidth/scrollHeight(ie7有兼容问题，为页面有的内容的宽高，body的强撑无效)
			 * 		文档滚动条的宽高（即内容宽高）
			 * 
			 * document.documentElement.scrollTop/scrollLeft
			 * 		文档顶部、左部滚动距离；chrome一直返回 0(false)
			 * 		chrome兼容处理：
			 * 			document.body.scrollTop/scrollLeft
			 * 		
			 * 		
			 * 
			 * 
			 * 
			 */
			
			document.onclick=function(){
				alert( document.body.scrollTop )
			}
		</script>
	</body>
</html>
