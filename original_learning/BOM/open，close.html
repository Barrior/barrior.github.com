<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
	</head>
	<body>
		<input type="button" value="打开一个新窗口" />
		<input type="button" value="关闭打开的新窗口" />
		<script>
			var oBtn=document.getElementsByTagName('input')[0];
			var oClose=document.getElementsByTagName('input')[1];
			var opener=null;
			
			oBtn.onclick=function(){
				//open('http://www.baidu.com/','_self')
				
				opener=open();
				opener.document.body.style.background='red';
				//利用返回值向打开的新窗口设置文档背景颜色
			}
			
			oClose.onclick=function(){
				opener.close();
			}
			
			/*
			 * window.open(页面地址,打开方式);
			 * 		如果url为空，默认打开一个空白页，
			 * 		如果打开方式（跟a标签的一样写法）为空，默认新窗口打开
			 * 
			 * 返回值：新窗口的window对象
			 * 
			 * window.close()
			 * 		关闭窗口，具有兼容性，几乎不用啦
			 * 		可以通过js关闭用open方法打开的新窗口，无兼容性问题
			 * 
			 */
			
		</script>
	</body>
</html>
