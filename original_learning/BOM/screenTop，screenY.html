<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
	</head>
	<body style="margin: 0;">
		<div id="div1" style="width: 100px; padding: 10px; height: 100px;">
			<div style="width: 100; height: 200px; background: red;"></div>
		</div>
		
		<script>
			/*
			 * 
			 * widow.screenTop/sreenLeft
			 * 		声明浏览器窗口距离屏幕的X,Y坐标，ie，chrome
			 * 		ff不支持
			 * 
			 * window.innerWidth/Height
			 * 		返回窗口的文档显示区的宽高，ff，chrome
			 * 		ie8及一下不支持
			 * 
			 * window.outerWidth/outerHeight
			 * 		返回浏览器的宽高（窗口的外部宽高），ff，chrome
			 * 		ie8及一下不支持
			 * 
			 * 
			 */
			document.onclick=function(){
				alert( window.outerWidth )
			}
		</script>
	</body>
</html>
