<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>无标题文档</title>
<style>
div{width:600px; height:400px; border:1px solid #000; text-align:center; margin:50px auto;}
img{vertical-align:middle;}
.span1{display:inline-block; height:100%; vertical-align:middle;}

div.box2{display:table; position:relative; overflow:hidden;}
.span2{display:table-cell; text-align:center; vertical-align:middle; *position:absolute; left:50%; top:50%; border:1px solid #000;}
.img2{*position:relative; left:-50%; top:-50%;}
</style>
</head>

<body>
<!-- 第一种方法，比较简单 没什么兼容问题 -->
<div class="box">
    <img class="img1" src="1.jpg" width="300px"><span class="span1"></span>
</div>

<!-- 第二种方法复杂点，因为要兼容ie6 -->
<div class="box2">
    <span class="span2"><img class="img2" src="1.jpg" width="300px;"></span>
</div>
</body>
</html>
