<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<style>
			/*兼容：ie8+*/
			#demo{width: 96px; height: 96px; background: #fff; border: 2px solid #000; position: relative;}
			#demo:before, #demo:after{position: absolute; left: 100%; width: 0; height: 0; content: ""; border: solid transparent;}
			#demo:before{border-width: 10px; border-left-color: #000; top: 20px;}
			#demo:after{border-width: 8px; border-left-color: #fff; top: 22px;}
		</style>
	</head>
	<body>
		<div id="demo"></div>
	</body>
</html>
