<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>无标题文档</title>
<style>
*{margin: 0; padding: 0;}
div{width:0; height:0; border-left:40px solid rgba(0,0,0,1); border-top:20px solid rgba(0,0,0,0); border-bottom:20px solid rgba(0,0,0,0);}
.sj{border-radius:4px;}
.sj1{border-radius:8px;}
.sj2{border-radius:10px;}
.sj3{border-radius:16px;}
.sj4{border-radius:20px;}
.sj5{width:50px; height:40px; background:red; border-radius:4px; position:relative; border-top-right-radius:0; border-bottom-right-radius:0; text-align:center; line-height:40px;}
.sj5:after{content:""; display:block; position:absolute; right:-20px; top:0; width:0; height:0; border-left:20px solid rgba(255,0,4,1.00); border-top:20px solid rgba(255,0,4,0); border-bottom:20px solid rgba(255,0,4,0);}

/* 兼容ie6 */
#a{width: 60px; background-color: #008000; position: relative; margin: 30px 0 0 200px; display: block; line-height: 40px; color: #fff; font-size: 20px;}
#a i, #a b{width: 0; height: 0; line-height: 0; content: ''; position: absolute; top: 0;}
#a i{left: -40px; border: 20px solid #008000; border-left-color:transparent; _border-left-color: #fff;}
#a b{right: -40px; border: 20px solid transparent; _border-color:#fff; border-left-color: #008000;}
</style>
</head>

<body>
<div class="sj"></div>
<div class="sj2"></div>
<div class="sj3"></div>
<div class="sj4"></div>
<section class="sj5">返回</section>
<a id="a">
	<i></i>
	首页
	<b></b>
</a>
</body>
</html>
