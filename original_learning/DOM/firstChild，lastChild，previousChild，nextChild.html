<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
	</head>
	<body>
		<ul id="ul1">
			<li>111111</li>
			<li>222222</li>
			<li>333333</li>
			<li>444444</li>
		</ul>
		<script>
			/*
			  firstChild:	只读，属性		元素第一个子节点
				标准下：元素第一个子节点，包括文本节点
				非标准下：第一个元素类型子节点
			  firstElementChild:	只读，属性	标准下--第一个元素类型子节点
			  
			  lastElementChild || lastChild
			  previousElementSibling || previousSibling
			  nextElementSibling || nextSibling
			  都有与firstElementChild || firstChild 一样的特性
				
			*/
			var oUl=document.getElementById('ul1');
			
			var oFirst=oUl.firstElementChild || oUl.firstChild;
			//当父级没有元素子节点，有一个文本节点的时候，上面的就会报错了，因为标准浏览器走了firstChild
			//可以用children[0]代替，这样就一定是第一个元素类型的子节点了
	
			oFirst.style.background='red';
			
			
			var oLast=oUl.lastElementChild || oUl.lastChild;
			oLast.style.background='yellow';
			
			var oPrev=oLast.previousElementSibling || oLast.previousSibling;
			oPrev.style.background='green';
			
			var oNext=oFirst.nextElementSibling || oFirst.nextSibling;
			oNext.style.background='pink';
			
		</script>
	</body>
</html>
