<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<style>
			div{padding: 50px;}
			#div1{background: red;}
			#div2{background: yellow; zoom: 1;}
			#div3{background: green; }
		</style>
	</head>
	<body id="body">
		<div id="div1">
			<div id="div2">
				<div id="div3"></div>
			</div>
		</div>
		<script>
			/*
			  offsetParent:	只读，属性	离当前元素最近的有定位的父级节点
			  当元素没有定位父级，且元素没有定位，默认为body
			  当元素没有定位父级，且元素有定位的情况下：
			  		--ie7及以下offsetParent是html
			  		--其他都是body
			 当元素的某个父级触发了layout，比如说zoom，
			 	ie7及以下offsetParent指向触发了layout的父级
				
			*/
			var oDiv3=document.getElementById('div3');
			
			//alert(document.getElementById('div2').currentStyle.hasLayout)
			alert( oDiv3.offsetParent.id )
			
		</script>
	</body>
</html>
