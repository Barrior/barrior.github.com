<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<script>
			window.onload=function(){
				var oPro=document.getElementsByTagName('progress')[0];
				var oSpan=document.getElementsByTagName('span')[0];
				var num=0;
				
				var timer=setInterval(function(){
					oPro.value++;
					num+=1;
					oSpan.innerHTML=num+'%';
					
					if(oPro.value==100){
						clearInterval(timer);
						alert('关闭了定时器');
					}
				},30);
			};
		</script>
	</head>
	<body>
		<progress value="0" max="100"></progress><span style="margin-left: 6px;">0</span>
	</body>
</html>
