<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<style>
		#box{width: 250px; margin: 100px 0 0 300px; border: 1px solid red; padding: 50px; font-size: 36px;}
		</style>
		<script>
			window.onload=function(){
				
				var oS=document.getElementById('box');
				
				oS.onclick=function(){
					this.style.transition='.6s '+this.dataset.transition;
					this.style.backgroundColor='red';
					
					this.innerHTML='姓名：'+this.dataset.name+'，年龄：'+this.dataset.manAge;
				}
			}
		</script>
	</head>
	<body>
		<section id="box" data-name="wei" data-man-age="21" data-transition="ease-out">点击实现自定义数据的应用</section>
	</body>
</html>
