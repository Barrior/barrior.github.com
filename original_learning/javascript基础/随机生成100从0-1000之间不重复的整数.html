<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>随机生成100从0-1000之间不重复的整数</title>
	</head>
	<body>
		<script>
			var arr=[];
			var i=101;
			var str='';
			
			while(i--){
				var num=Math.round(Math.random()*1000);
				
				function fn(){
					for(var j=0; j<arr.length; j++){
						if(arr[j]==num){
							i++;
							return true;
						}
					}
				}
				
				if(!fn()){
					arr.push( num );
				}
				
			}
			
			for(var i=0; i<arr.length; i++){
				if(i%10==0){
					if(i){
						str+=arr[i]+'<br><br>';
					}
				}else{
					str+=arr[i]+',';
				}
			}
			document.write(str);
		</script>
	</body>
</html>
