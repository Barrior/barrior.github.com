<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>无缝滚动练习</title>
<style>
ul,li{margin:0; padding:0;}
img{border:0;}
.div2{width:868px; height:108px; position:relative; margin:50px auto 0;}

.left{width:68px; height:68px; background:url(btn.jpg) -68px -68px; display:block; float:left; margin-top:22px; margin-right:10px;}
.left:hover{background:url(btn.jpg) no-repeat -68px 0;}
.right{width:68px; height:68px; background:url(btn.jpg) 0 -68px; display:block; float:left; margin-top:22px; margin-left:10px; position:absolute; left:790px;}
.right:hover{background:url(btn.jpg);}

.div1{width:712px; height:108px; position:relative; overflow:hidden;}
.div1 ul{width:712px; height:108px; position:absolute;}
.div1 ul li{width:178px; height:108px; float:left; list-style:none;}
.div1 ul li a:hover{top:2px; position:relative;};
</style>

<script>
window.onload=function()
{
	var oDiv=document.getElementsByClassName('div1')[0];
	var oUl=oDiv.getElementsByTagName('ul')[0];
	var aLi=oUl.getElementsByTagName('li');
	
	var left=document.getElementsByClassName('left')[0];
	var right=document.getElementsByClassName('right')[0];
	
	speed=-2;
	
	oUl.innerHTML=oUl.innerHTML+oUl.innerHTML;
	oUl.style.width=aLi[0].offsetWidth*aLi.length+'px';
	
	function roll(){
		if(oUl.offsetLeft<-oUl.offsetWidth/2){
			oUl.style.left='0';
		}
		if(oUl.offsetLeft>0){
			oUl.style.left=-oUl.offsetWidth/2+'px';
		}
		oUl.style.left=oUl.offsetLeft+speed+'px';
	}
	
	var timer=setInterval(roll,30);
	
	oDiv.onmouseover=function(){
		clearInterval(timer);
	};
	oDiv.onmouseout=function(){
		timer=setInterval(roll,30);
	};
	
	left.onclick=function(){
		speed=-2;
	};
	right.onclick=function(){
		speed=2;
	};
};
</script>
</head>

<body>
<div class="div2">
    <a class="left" href="javascript:;"></a>
    <a class="right" href="javascript:;"></a>
    <div class="div1">
        <ul>
            <li><a href="#"><img src="1.jpg" /></a></li>
            <li><a href="#"><img src="2.jpg" /></a></li>
            <li><a href="#"><img src="3.jpg" /></a></li>
            <li><a href="#"><img src="4.jpg" /></a></li>
        </ul>
    </div>
</div>
</body>
</html>
