<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<style>
			*{
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			body{
				font: 14px/1.5 arial;
			}
			#wrap{
				width: 940px;
				margin: 50px auto 0;
				overflow: hidden;
			}
			ul{
				width: 300px;
				margin-right: 20px;
				float: left;
			}
			ul:last-of-type{
				margin-right: 0;
			}
			li{
				margin-bottom: 20px;
				padding: 10px;
				border: 1px solid #ccc;
				list-style: none;
			}
			img{
				width: 100%;
			}
			#loading{
				margin: 20px 0;
				text-align: center;
			}
		</style>
	</head>
	<body>
		<div id="wrap">
			<ul>
				<li>
					<img src="img/1 (1).jpg" />
					<p>Beautiful girl</p>
				</li>
				<li>
					<img src="img/1 (2).jpg" />
					<p>Beautiful girl</p>
				</li>
				<li>
					<img src="img/1 (3).jpg" />
					<p>Beautiful girl</p>
				</li>
			</ul>
			<ul>
				<li>
					<img src="img/1 (4).jpg" />
					<p>Beautiful girl</p>
				</li>
				<li>
					<img src="img/1 (5).jpg" />
					<p>Beautiful girl</p>
				</li>
				<li>
					<img src="img/1 (6).jpg" />
					<p>Beautiful girl</p>
				</li>
			</ul>
			<ul>
				<li>
					<img src="img/1 (7).jpg" />
					<p>Beautiful girl</p>
				</li>
				<li>
					<img src="img/1 (8).jpg" />
					<p>Beautiful girl</p>
				</li>
				<li>
					<img src="img/1 (9).jpg" />
					<p>Beautiful girl</p>
				</li>
			</ul>
		</div>
		<script>
			var aUl = document.getElementsByTagName('ul')
			var len = aUl.length
			window.onscroll = function(){
				if( window.scrollY >= document.documentElement.offsetHeight - 
					document.documentElement.clientHeight ){
					for(var i = 0; i < len; i++){
						aUl[ i ].innerHTML +=
							'<li><img src="img/1 (' +
							Math.round( Math.random()*17 + 1 ) +
							').jpg" /><p>Beautiful girl</p></li>'
					}
				}
			}
			
		</script>
	</body>
</html>
