<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>滑动菜单</title>
<style>
*{margin:0; padding:0;}
nav{width:600px; height:60px; position:relative; display:block; margin:50px auto; border:1px solid #000;}
nav a{display:block; width:100px; height:40px; float:left; text-align:center; padding-top:20px; color:#000; text-decoration:none;}
nav .active{color:#0F0;}
nav div{width:100px; height:60px; background:yellow; position:absolute; z-index:-1; top:0; left:0;}
</style>
<script src="common.js" type="text/javascript"></script>
</head>

<body>
<nav id="nav">
    <a class="active" href="#home" id="home" href="index">首页</a>
    <a href="#self" id="home">自我介绍</a>
    <a href="#shige" id="shige">诗歌</a>
    <a href="#photo" id="photo">相册</a>
    <a href="#phone" id="phone">联系方式</a>
    <a href="#other" id="other">其他</a>
    <div id="slide"></div>
</nav>
</body>
</html>
