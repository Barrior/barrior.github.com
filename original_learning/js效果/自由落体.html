<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>无标题文档</title>
<style>
#div1{width:200px; height:200px; position:absolute; background:red;}
</style>
<script>
window.onload=function(){
	var oInput=document.getElementById('input1');
	var oDiv=document.getElementById('div1');
	var timer=null;
	var speed=0;
	
	oInput.onclick=function(){
		startMove();
	};
	
	function startMove(){
		clearInterval(timer);
		timer=setInterval(function(){
			speed+=3;
			var t=oDiv.offsetTop+speed;
			if(t>document.documentElement.clientHeight-oDiv.offsetHeight){
				t=document.documentElement.clientHeight-oDiv.offsetHeight;
				speed*=-1;
				speed*=0.825;
			}
			oDiv.style.top=t+'px';
		},30);
	}
	
	if(oDiv.style.top=document.documentElement.clientHeight-oDiv.offsetHeight){
		clearInterval(timer);
	}//当div停止的时候，关掉定时器；上面代码我知道想 不知道可不可行？？
	
};
</script>
</head>

<body>
<input id="input1" type="button" value="点击">
<div id="div1"></div>
</body>
</html>
