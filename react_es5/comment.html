<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div id="demo"></div>

<script src="react/react.min.js"></script>
<script src="react/react-dom.min.js"></script>
<script src="react/browser.min.js"></script>

<script type="text/babel">
    var Component = React.createClass({
        getInitialState: function(){
            return {
                data: this.props.data
            }
        },
        render: function(){
            return (
                <div>
                    <div>
                        <textarea placeholder="浅谈一下你的观点吧~" rows="4"
                            ref="content">
                        </textarea>
                        <input type="button" value="评论" onClick={this.addComment} />
                    </div>
                    <div>
                        <ul>
                            {
                                this.state.data.map(function( v ){
                                    return <li>{v}</li>
                                })
                            }
                        </ul>
                    </div>
                </div>
            )
        },
        addComment: function(){
            console.log( this )
            console.log( this.refs )
            var newData = this.state.data
            newData.unshift( this.refs.content.value )
            this.refs.content.value = ''
            this.setState({
                data: newData
            })
        }
    })

    var data = {
        data: [
            '恩~，今天天气真不错',
            'yes, all right',
            'let\'s go to play basketball with them'
        ]
    }

    ReactDOM.render(
        <Component {...data} />,
        document.getElementById('demo')
    )
</script>
</body>
</html>
