<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        #app{
            display: inline-block;
            padding: 4px 8px;
            background-color: #999;
            font: 14px/1.5 normal "微软雅黑";
            color: #fff;
        }
        #app.red{
            background-color: red;
        }
        #app.green{
            background-color: green;
        }
        #app.blue{
            background-color: blue;
        }
        .black{
            color: #000;
        }
        .bold{
            font-weight: 900;
        }
    </style>
</head>
<body>
    <div id="app" v-bind:class="classObj">
        我会按钮，我会切换颜色哟~
        <span v-bind:class="[ black, bold ]">span</span>
    </div>

    <script src="js/vue.js"></script>
    <script>
        var vm = new Vue({
            el: '#app',
            data: {
                classObj: {
                    red: true,
                    green: false,
                    blue: false
                },
                black: 'black',
                bold: 'bold'
            }
        });

        var color = [ 'red', 'green', 'blue' ];
        var i = 0;

        function changeColor(){
            setTimeout(function(){
                color.forEach(function( v ){
                    vm.classObj[ v ] = false;
                });
                vm.classObj[ color[ i % 3 ] ] = true;
                i++;
                changeColor();
            }, 1000 );
        }
        changeColor();
    </script>
</body>
</html>
