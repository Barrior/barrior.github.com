<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <div id="app">
        <h3>{{title}}</h3>
        <button type="button" v-on:click="clickHandler">click me!</button>
    </div>

    <script src="js/vue.js"></script>
    <script>
        new Vue({
            el: '#app',
            data: {
                title: 'Hello vue'
            },
            methods: {
                clickHandler: function(){
                    this.title = 'This is click title'
                }
            }
        });
    </script>
</body>
</html>
