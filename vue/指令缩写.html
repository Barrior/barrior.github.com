<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <div id="app">
        <h3 style="color: red">{{ content }}</h3>
        <h3 v-bind:style="{color: 'red'}" v-on:click="alert(content + ' - 1')">{{ content }} - 1</h3>
        <h3 :style="{color: 'blue'}" @click="alert(content + ' - 2')">{{ content }} - 2</h3>
    </div>

    <script src="js/vue.js"></script>
    <script>
        new Vue({
            el: '#app',
            data: {
                content: 'hello world'
            },
            methods: {
                alert: function( msg ){
                    alert( msg );
                }
            }
        });
    </script>
</body>
</html>
