<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <div id="app">
        <textarea rows="6" v-model="newTodo" v-on:keyup.enter="addTodo"></textarea>
        <textarea rows="6" v-ref="newTodo" v-on:keyup.enter="addTodo"></textarea>
        <ul>
            <li v-for="d in todos">
                <span>{{d.title}}</span>
                <button type="button" v-on:click="removeTodo($index)">x</button>
            </li>
        </ul>

    </div>

    <script src="js/vue.js"></script>
    <script>
        new Vue({
            el: '#app',
            data: {
                newTodo: '',
                todos: [{
                    title: 'The first todo'
                }]
            },
            methods: {
                addTodo: function(){
                    console.log( this )
                    console.log( this.$refs )
                    var text = this.newTodo.trim();
                    if( text ){
                        this.todos.unshift({
                            title: text
                        });
                        this.newTodo = '';
                    }
                },
                removeTodo: function( index ){
                    this.todos.splice( index, 1 );
                }
            }
        });
    </script>
</body>
</html>
