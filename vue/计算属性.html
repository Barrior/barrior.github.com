<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <div id="app">
        <h3>
            a = {{ a }}, b = {{ b }}
        </h3>
    </div>

    <script src="js/vue.js"></script>
    <script>
        new Vue({
            el: '#app',
            data: {
                a: 1
            },
            computed: {
                b: function(){
                    return this.a + 1;
                }
            }
        });
    </script>
</body>
</html>
